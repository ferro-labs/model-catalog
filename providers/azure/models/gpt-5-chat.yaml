extends: openai/gpt-5-chat
provider: azure
model_id: gpt-5-chat
display_name: gpt-5-chat
pricing:
    input_per_m_tokens: 1.25
    output_per_m_tokens: 10
    cache_read_per_m_tokens: 0.125
    cache_write_per_m_tokens: null
    reasoning_per_m_tokens: null
    image_per_tile: null
    audio_input_per_minute: null
