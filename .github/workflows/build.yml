name: Build
on:
  push:
    branches: [main]
    paths:
      - 'providers/**'
      - 'cmd/**'
      - 'catalog/**'
      - 'scrape/**'
      - 'internal/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate
        run: go run ./cmd/ferrocat validate

      - name: Build
        run: go run ./cmd/ferrocat build --output dist/

      - name: Detect meaningful dist changes
        id: dist_changes
        run: |
          set -euo pipefail
          if git diff --quiet -- dist/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_manifest="$(mktemp)"
          after_manifest="$(mktemp)"
          git show HEAD:dist/manifest.json | jq 'del(.version, .generated_at)' > "$before_manifest"
          jq 'del(.version, .generated_at)' dist/manifest.json > "$after_manifest"

          manifest_changed=false
          if ! cmp -s "$before_manifest" "$after_manifest"; then
            manifest_changed=true
          fi

          dist_payload_changed=false
          if ! git diff --quiet -- dist/catalog.json dist/providers/; then
            dist_payload_changed=true
          fi

          if [ "$manifest_changed" = "true" ] || [ "$dist_payload_changed" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only dist/manifest.json version/generated_at changed; skipping dist PR."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create dist PR
        if: steps.dist_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build: regenerate dist"
          title: "build: regenerate dist"
          body: |
            Auto-generated by the build workflow.

            Regenerated `dist/` artifacts from source YAML files.
            Merging this PR will trigger the release workflow.
          branch: build/dist-${{ github.run_id }}
          labels: auto-pr
          delete-branch: true
          add-paths: dist/
