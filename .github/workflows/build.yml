name: Build
on:
  push:
    branches: [main]
    paths:
      - 'providers/**'
      - 'cmd/**'
      - 'catalog/**'
      - 'scrape/**'
      - 'internal/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate
        run: go run ./cmd/ferrocat validate

      - name: Build
        run: go run ./cmd/ferrocat build --output dist/

      - name: Determine version
        id: version
        run: |
          VERSION="v$(date -u +%Y.%m.%d)"
          SUFFIX=""
          COUNTER=0
          while git tag -l "${VERSION}${SUFFIX}" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            SUFFIX=".${COUNTER}"
          done
          FINAL="${VERSION}${SUFFIX}"
          echo "version=${FINAL}" >> "$GITHUB_OUTPUT"

      - name: Create dist PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build: regenerate dist ${{ steps.version.outputs.version }}"
          title: "build: regenerate dist ${{ steps.version.outputs.version }}"
          body: |
            Auto-generated by the build workflow.

            Regenerated `dist/` artifacts from source YAML files.
            Merging this PR will trigger the release workflow.
          branch: build/dist-${{ github.run_id }}
          labels: auto-pr
          delete-branch: true
          add-paths: dist/
