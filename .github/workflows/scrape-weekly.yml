name: Weekly Scrape
on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      RUN_ID: ${{ github.run_id }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build catalog
        run: go run ./cmd/ferrocat build --output dist/

      - name: Freshness check against provider APIs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FIREWORKS_ACCOUNT_ID: ${{ vars.FIREWORKS_ACCOUNT_ID }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: go run ./cmd/ferrocat freshness || true

      - name: Scrape and auto-add
        id: scrape
        run: |
          go run ./cmd/ferrocat scrape --auto-add --write --report /tmp/scrape-report.md || true

          ADDED=$(git diff --name-only --diff-filter=A providers/ | wc -l | tr -d ' ')
          MODIFIED=$(git diff --name-only --diff-filter=M providers/ | wc -l | tr -d ' ')
          echo "added=${ADDED}" >> "$GITHUB_OUTPUT"
          echo "modified=${MODIFIED}" >> "$GITHUB_OUTPUT"

      - name: Backfill source URLs
        run: go run ./cmd/ferrocat backfill-source || true

      - name: Rebuild after changes
        run: |
          if ! git diff --quiet providers/; then
            go run ./cmd/ferrocat build --output dist/
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "scrape: weekly catalog refresh"
          title: "scrape: weekly catalog refresh"
          body: |
            ## Weekly scrape refresh

            - **New models added**: ${{ steps.scrape.outputs.added }}
            - **Models updated**: ${{ steps.scrape.outputs.modified }}

            Auto-generated by the weekly scrape workflow.
          branch: scrape/weekly-${{ github.run_id }}
          labels: auto-pr
          delete-branch: true

      - name: Track failures
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="scrape: weekly scrape failure"
          EXISTING=$(gh issue list --state open --search "$TITLE" --json number -q '.[0].number' || echo "")
          if [ -z "$EXISTING" ]; then
            gh issue create --title "$TITLE" --body "Weekly scrape failed. See workflow run: $RUN_URL" --label "bug"
          fi
