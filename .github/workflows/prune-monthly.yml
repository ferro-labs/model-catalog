name: Monthly Prune

on:
  schedule:
    - cron: '0 7 1 * *'  # First day of month, 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prune sunset models
        run: go run ./cmd/ferrocat prune --days 90

      - name: Rebuild catalog
        run: |
          if ! git diff --quiet providers/; then
            go run ./cmd/ferrocat build --output dist/
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "prune: remove expired sunset models"
          title: "prune: remove expired sunset models"
          body: |
            ## Monthly sunset prune

            Removes models with `lifecycle.sunset_date` older than 90 days and regenerates `dist/`.
          branch: prune/monthly-${{ github.run_id }}
          labels: auto-pr
          delete-branch: true
