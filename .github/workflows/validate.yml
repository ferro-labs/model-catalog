name: Validate
on:
  pull_request:
    paths:
      - 'providers/**'
      - 'cmd/**'
      - 'catalog/**'
      - 'scrape/**'
      - 'internal/**'
      - '.github/workflows/**'
      - 'Makefile'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Validate
        run: go run ./cmd/ferrocat validate
      - name: Lint
        run: go run ./cmd/ferrocat lint
      - name: Test
        run: go test -race ./...
      - name: Build dry-run
        run: |
          go run ./cmd/ferrocat build --output /tmp/dist
          jq -r '"Build produced \(.stats.total_models) models"' /tmp/dist/manifest.json
          rm -rf /tmp/catalog-pages
          mkdir -p /tmp/catalog-pages/v1
          cp -R /tmp/dist/. /tmp/catalog-pages/
          cp -R /tmp/dist/. /tmp/catalog-pages/v1/
          cmp /tmp/dist/manifest.json /tmp/catalog-pages/manifest.json
          cmp /tmp/dist/manifest.json /tmp/catalog-pages/v1/manifest.json
          test -f /tmp/catalog-pages/v1/providers/openai.json
